<nav class="ds-breadcrumbs" aria-label="Breadcrumb">
  <ol class="ds-breadcrumbs__list">
    @for (item of items(); track item.label; let last = $last) {
      <li class="ds-breadcrumbs__item">
        @if (!last && item.href) {
          <a class="ds-breadcrumbs__link" [routerLink]="item.href">{{ item.label }}</a>
        } @else {
          <span class="ds-breadcrumbs__current" [attr.aria-current]="last ? 'page' : null">{{ item.label }}</span>
        }
        @if (!last) {
          <span class="ds-breadcrumbs__separator" aria-hidden="true">/</span>
        }
      </li>
    }
  </ol>
</nav>
