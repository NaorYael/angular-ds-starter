<div class="ds-input-password" [class.ds-input-password--invalid]="!!error()">
  @if (label()) {
    <label class="ds-input-password__label" [attr.for]="id() || null">
      {{ label() }}
      @if (required()) {
        <span class="ds-input-password__required" aria-hidden="true">*</span>
      }
    </label>
  }

  <div class="ds-input-password__wrapper">
    <input
      class="ds-input-password__control"
      [id]="id() || null"
      [type]="inputType()"
      [placeholder]="placeholder()"
      [disabled]="isFieldDisabled()"
      [required]="required()"
      [value]="value()"
      (input)="onInput($any($event.target).value)"
      (blur)="onBlur()"
    />
    <button
      type="button"
      class="ds-input-password__toggle"
      [attr.aria-label]="visible() ? 'Hide password' : 'Show password'"
      [disabled]="isFieldDisabled()"
      (click)="toggleVisibility()"
    >
      {{ visible() ? 'Hide' : 'Show' }}
    </button>
  </div>

  @if (error()) {
    <p class="ds-input-password__message ds-input-password__message--error" role="alert">{{ error() }}</p>
  } @else if (hint()) {
    <p class="ds-input-password__message">{{ hint() }}</p>
  }
</div>
