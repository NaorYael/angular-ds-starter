<div class="ds-select" [class.ds-select--invalid]="!!error()">
  @if (label()) {
    <label class="ds-select__label" [attr.for]="id() || null">
      {{ label() }}
      @if (required()) {
        <span class="ds-select__required" aria-hidden="true">*</span>
      }
    </label>
  }

  <div class="ds-select__wrapper">
    <select
      class="ds-select__control"
      [id]="id() || null"
      [disabled]="isFieldDisabled()"
      [required]="required()"
      [value]="selectedValue()"
      (change)="onSelect($any($event.target).value)"
      (blur)="onBlur()"
    >
      <option value="" disabled [selected]="!selectedValue()">{{ placeholder() }}</option>
      @for (option of options(); track option.value) {
        <option [value]="option.value" [disabled]="option.disabled ?? false">
          {{ option.label }}
        </option>
      }
    </select>
  </div>

  @if (error()) {
    <p class="ds-select__message ds-select__message--error" role="alert">{{ error() }}</p>
  } @else if (hint()) {
    <p class="ds-select__message">{{ hint() }}</p>
  }
</div>
