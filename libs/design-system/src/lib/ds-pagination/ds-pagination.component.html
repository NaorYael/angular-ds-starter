<div class="ds-pagination">
  <span class="ds-pagination__range">{{ rangeLabel() }}</span>
  <div class="ds-pagination__controls">
    <button type="button" class="ds-pagination__button" [disabled]="page() <= 1" (click)="goToPage(page() - 1)">
      Previous
    </button>
    <span class="ds-pagination__page">Page {{ page() }} / {{ totalPages() }}</span>
    <button
      type="button"
      class="ds-pagination__button"
      [disabled]="page() >= totalPages()"
      (click)="goToPage(page() + 1)"
    >
      Next
    </button>
  </div>
</div>
