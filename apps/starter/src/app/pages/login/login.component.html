<section class="page login-page">
  <div class="login-card">
    <header class="login-card__header">
      <h1>Sign in</h1>
      <p>Auth skeleton with <code>AuthService</code>, guard, and HTTP interceptor.</p>
    </header>

    @if (error()) {
      <ds-alert variant="error" [message]="error()" />
    }

    <form class="login-form" (ngSubmit)="submit()">
      <ds-input
        id="login-email"
        label="Email"
        type="email"
        placeholder="you@example.com"
        [(ngModel)]="email"
        name="email"
        required
      />

      <ds-input-password
        id="login-password"
        label="Password"
        placeholder="Enter your password"
        hint="Demo login accepts any password."
        [(ngModel)]="password"
        name="password"
        required
      />

      <ds-button
        type="submit"
        variant="primary"
        label="Sign in"
        [grow]="true"
        [loading]="loading()"
      />
    </form>
  </div>
</section>
