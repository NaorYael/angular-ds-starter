<div class="shell">
  <header class="shell-header">
    <div class="shell-brand">
      <span class="shell-brand__title">Angular DS Starter</span>
      <span class="shell-brand__subtitle">Design System ready to use</span>
    </div>

    <nav class="shell-nav">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Components</a>
      <a routerLink="/grid" routerLinkActive="is-active">Grid</a>
      <a routerLink="/charts" routerLinkActive="is-active">Charts</a>
      <a routerLink="/dashboard" routerLinkActive="is-active">Dashboard</a>
      @if (auth.isAuthenticated()) {
        <button type="button" class="shell-nav__button" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" routerLinkActive="is-active">Login</a>
      }
    </nav>
  </header>

  <main class="shell-main">
    <router-outlet />
  </main>
</div>

<ds-toast-container />
